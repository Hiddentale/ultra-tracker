<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Tracker</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/landing.css">
</head>

<body>
  <div class="card">
    <h1>ULTRA TRACKER</h1>
    <div class="divider"><span class="divider-dot"></span></div>

    <div id="race-list" class="race-list">
      <p class="loading-text">Loading races...</p>
    </div>

    <div id="empty-state" class="empty-state reveal">
      <p>No active races</p>
    </div>

    <div class="admin-link">
      <a href="admin.html">Set up a new race</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/landing.js"></script>
</body>

</html>
