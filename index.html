<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Tracker</title>
  <link rel="stylesheet" href="css/landing.css">
</head>
<body>
  <div class="card">
    <h1>Ultra Tracker</h1>
    <p class="subtitle">Enter a race ID to view live tracking</p>

    <form id="race-form">
      <input type="text" id="race-id" placeholder="Race ID" autocomplete="off" autofocus>
      <button type="submit">Track Race</button>
      <p class="error" id="error">Please enter a race ID</p>
    </form>

    <div class="admin-link">
      <a href="admin.html">Race organiser? Set up a new race</a>
    </div>
  </div>

  <script src="js/landing.js"></script>
</body>
</html>
