<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Setup — Ultra Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { font-size: 1.4rem; margin-bottom: 16px; }
    h2 { font-size: 1.1rem; margin: 16px 0 8px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 12px;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #map-preview { width: 100%; height: 350px; border-radius: 8px; margin: 12px 0; display: none; }
    .station-list { margin: 8px 0; }
    .station-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.9rem;
    }
    .station-item button {
      background: #ef4444;
      padding: 4px 8px;
      font-size: 0.8rem;
    }
    #result {
      display: none;
      background: #ecfdf5;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    #result h2 { color: #16a34a; margin-top: 0; }
    .token-display {
      background: #1a1a1a;
      color: #4ade80;
      padding: 10px 14px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
      margin: 8px 0;
    }
    .instructions {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px;
      margin-top: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .instructions code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.85em;
    }
    .hint { font-size: 0.8rem; color: #6b7280; margin-bottom: 8px; }
    .form-section { margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Race Setup</h1>

  <div class="form-section">
    <label for="race-name">Race Name</label>
    <input type="text" id="race-name" placeholder="e.g. Trail des Géants 2026">
  </div>

  <div class="form-section">
    <label for="gpx-file">GPX Route File</label>
    <input type="file" id="gpx-file" accept=".gpx">
    <div id="gpx-info" class="hint"></div>
  </div>

  <div id="map-preview"></div>

  <div class="form-section" id="aid-section" style="display:none">
    <h2>Aid Stations</h2>
    <p class="hint">Click on the map to add an aid station. Drag markers to reposition. Or add manually below.</p>

    <div style="display:flex; gap:8px; margin: 8px 0; flex-wrap: wrap;">
      <input type="text" id="station-name" placeholder="Station name" style="flex:1; min-width:120px; margin:0">
      <input type="text" id="station-dist" placeholder="Distance (km)" style="width:110px; margin:0">
      <button type="button" onclick="addStationManual()">Add</button>
    </div>

    <div id="station-list" class="station-list"></div>
  </div>

  <button id="create-btn" onclick="createRace()" disabled>Create Race</button>

  <div id="result">
    <h2>Race Created!</h2>
    <p><strong>Race ID:</strong> <span id="result-id"></span></p>
    <p><strong>Viewer URL:</strong> <a id="result-url" href="#" target="_blank"></a></p>
    <p><strong>Auth Token</strong> (save this — shown only once):</p>
    <div class="token-display" id="result-token"></div>

    <div class="instructions" id="overland-instructions"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/api.js"></script>
  <script>
    let gpxString = null;
    let routePoints = [];
    let aidStations = [];
    let previewMap = null;
    let routeLayer = null;
    let stationMarkers = [];

    // Parse GPX client-side for preview
    function parseGpxClient(text) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, "text/xml");
      const trkpts = doc.querySelectorAll("trkpt");
      const points = [];
      for (const pt of trkpts) {
        const lat = parseFloat(pt.getAttribute("lat"));
        const lon = parseFloat(pt.getAttribute("lon"));
        const eleEl = pt.querySelector("ele");
        const ele = eleEl ? parseFloat(eleEl.textContent) : null;
        points.push({ lat, lon, ele });
      }
      return points;
    }

    document.getElementById("gpx-file").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      gpxString = await file.text();
      routePoints = parseGpxClient(gpxString);

      document.getElementById("gpx-info").textContent =
        `${routePoints.length} trackpoints loaded`;

      if (routePoints.length < 2) {
        document.getElementById("gpx-info").textContent = "Error: GPX has fewer than 2 points";
        return;
      }

      // Show map preview
      const mapDiv = document.getElementById("map-preview");
      mapDiv.style.display = "block";

      if (!previewMap) {
        previewMap = L.map("map-preview");
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(previewMap);

        previewMap.on("click", onMapClick);
      }

      if (routeLayer) previewMap.removeLayer(routeLayer);
      const latlngs = routePoints.map(p => [p.lat, p.lon]);
      routeLayer = L.polyline(latlngs, { color: "#2563eb", weight: 3 }).addTo(previewMap);
      previewMap.fitBounds(routeLayer.getBounds(), { padding: [20, 20] });

      document.getElementById("aid-section").style.display = "block";
      document.getElementById("create-btn").disabled = false;
    });

    function onMapClick(e) {
      const name = prompt("Aid station name:");
      if (!name) return;

      // Compute approximate distance along route
      const dist = estimateDistanceKm(e.latlng.lat, e.latlng.lng);
      addStation(name, e.latlng.lat, e.latlng.lng, dist);
    }

    function estimateDistanceKm(lat, lon) {
      // Simple: find closest route point, use its index fraction * total distance
      let bestDist = Infinity;
      let bestIdx = 0;
      const R = 6371000;
      const toRad = x => x * Math.PI / 180;

      for (let i = 0; i < routePoints.length; i++) {
        const p = routePoints[i];
        const dLat = toRad(p.lat - lat);
        const dLon = toRad(p.lon - lon);
        const a = Math.sin(dLat / 2) ** 2 +
          Math.cos(toRad(lat)) * Math.cos(toRad(p.lat)) * Math.sin(dLon / 2) ** 2;
        const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        if (d < bestDist) { bestDist = d; bestIdx = i; }
      }

      // Rough cumulative distance
      let cumDist = 0;
      for (let i = 1; i <= bestIdx; i++) {
        const a = routePoints[i - 1], b = routePoints[i];
        const dLat = toRad(b.lat - a.lat);
        const dLon = toRad(b.lon - a.lon);
        const s = Math.sin(dLat / 2) ** 2 +
          Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLon / 2) ** 2;
        cumDist += R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
      }
      return Math.round(cumDist / 100) / 10;
    }

    function addStationManual() {
      const name = document.getElementById("station-name").value.trim();
      const dist = parseFloat(document.getElementById("station-dist").value);
      if (!name || isNaN(dist)) return;
      addStation(name, null, null, dist);
      document.getElementById("station-name").value = "";
      document.getElementById("station-dist").value = "";
    }

    function createDraggableMarker(lat, lon, idx) {
      const marker = L.marker([lat, lon], {
        draggable: true,
        autoPan: true,
      }).bindPopup(aidStations[idx].name).addTo(previewMap);

      marker.on("dragend", () => {
        const pos = marker.getLatLng();
        aidStations[idx].lat = pos.lat;
        aidStations[idx].lon = pos.lng;
        aidStations[idx].distance_km = estimateDistanceKm(pos.lat, pos.lng);
        renderStationList();
      });

      return marker;
    }

    function addStation(name, lat, lon, distKm) {
      const idx = aidStations.length;
      aidStations.push({ name, lat, lon, distance_km: distKm });

      if (lat != null && previewMap) {
        stationMarkers.push(createDraggableMarker(lat, lon, idx));
      }

      renderStationList();
    }

    function rebuildMarkers() {
      stationMarkers.forEach(m => previewMap.removeLayer(m));
      stationMarkers = [];
      for (let i = 0; i < aidStations.length; i++) {
        const s = aidStations[i];
        if (s.lat != null && previewMap) {
          stationMarkers.push(createDraggableMarker(s.lat, s.lon, i));
        }
      }
    }

    function removeStation(idx) {
      aidStations.splice(idx, 1);
      rebuildMarkers();
      renderStationList();
    }

    function renderStationList() {
      const list = document.getElementById("station-list");
      list.innerHTML = aidStations.map((s, i) =>
        `<div class="station-item">
          <span>${s.name} — ${s.distance_km} km</span>
          <button onclick="removeStation(${i})">Remove</button>
        </div>`
      ).join("");
    }

    async function createRace() {
      const name = document.getElementById("race-name").value.trim();
      if (!name) { alert("Enter a race name"); return; }
      if (!gpxString) { alert("Upload a GPX file"); return; }

      const btn = document.getElementById("create-btn");
      btn.disabled = true;
      btn.textContent = "Creating...";

      try {
        const result = await API.createRace(name, gpxString, aidStations);

        document.getElementById("result-id").textContent = result.id;
        const urlEl = document.getElementById("result-url");
        urlEl.href = result.viewer_url;
        urlEl.textContent = result.viewer_url;
        document.getElementById("result-token").textContent = result.token;

        const workerDomain = WORKER_URL.replace("https://", "");
        document.getElementById("overland-instructions").innerHTML = `
          <strong>Overland App Configuration:</strong><br>
          1. Install <a href="https://apps.apple.com/app/overland-gps-tracker/id1292426766" target="_blank">Overland</a> from the App Store<br>
          2. Set receiver endpoint to:<br>
          <code>${WORKER_URL}/api/race/${result.id}/location</code><br>
          3. Add HTTP header: <code>Authorization: Bearer ${result.token}</code><br>
          4. Set tracking interval to <strong>30 seconds</strong><br>
          5. Set accuracy to <strong>High</strong><br>
          6. Turn <strong>OFF</strong> visit detection
        `;

        document.getElementById("result").style.display = "block";
      } catch (err) {
        alert("Failed to create race: " + err.message);
        btn.disabled = false;
        btn.textContent = "Create Race";
      }
    }
  </script>
</body>
</html>
