<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading-overlay">Loading race data...</div>
  <div id="error-banner"></div>

  <div id="app">
    <div id="map"></div>

    <div id="elevation-container">
      <canvas id="elevation-canvas"></canvas>
    </div>

    <div id="stats-panel">
      <div class="stat-section">
        <div class="section-label">
          Next Aid Stations
          <span id="off-route-badge" class="off-route-badge">OFF ROUTE</span>
        </div>
        <div id="aid-station-list"></div>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-value" id="pace-value">--</span>
          <span class="stat-label">Pace</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="distance-value">--</span>
          <span class="stat-label">Distance</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="elevation-value">--</span>
          <span class="stat-label">Altitude</span>
        </div>
        <div class="stat-item staleness">
          <span class="staleness-dot fresh" id="staleness-dot"></span>
          <span id="staleness-text">--</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/api.js"></script>
  <script src="js/route-snap.js"></script>
  <script src="js/eta.js"></script>
  <script src="js/elevation.js"></script>
  <script src="js/map.js"></script>
  <script src="js/tracker.js"></script>
</body>
</html>
